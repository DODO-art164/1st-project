<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FashionOps AI - 패션 셀러 계산 도구</title>
<meta name="description" content="패션 브랜드와 쇼핑몰 운영자를 위한 판매가, 마진, 재고 계산 도구">
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:auto;padding:40px;color:#222}h1{font-size:42px}section{border:1px solid #ddd;border-radius:16px;padding:24px;margin:20px 0}input{padding:10px;margin:5px;width:150px}button{padding:12px;background:#111;color:white;border:0;border-radius:8px;cursor:pointer}.result{margin-top:15px;font-weight:bold}
</style>
</head>
<body>
<h1>FashionOps AI</h1>
<p>패션 브랜드와 쇼핑몰 운영자를 위한 무료 손익·재고 분석 도구</p>
<section>
<h2>판매가 순이익 계산기</h2>
<input id="cost" placeholder="원가" value="30000"><input id="price" placeholder="판매가" value="79000"><input id="fee" placeholder="수수료%" value="15"><br>
<button onclick="calc()">계산하기</button><div class="result" id="r"></div>
</section>
<section>
<h2>제공 예정 기능</h2>
<ul><li>의류 판매가 계산기</li><li>재고 회전율 계산기</li><li>손익분기점 계산기</li><li>AI 상세페이지 생성기</li></ul>
</section>
<div style="height:100px;border:1px dashed #aaa;text-align:center;padding-top:40px">AdSense 광고 영역</div>
<footer><p><a href="privacy.html">개인정보처리방침</a> | <a href="terms.html">이용약관</a></p></footer>
<script>function calc(){let c=Number(cost.value),p=Number(price.value),f=Number(fee.value)/100;let x=p-c-(p*f);r.innerHTML='예상 순이익: '+x.toLocaleString()+'원'}</script>
</body></html>
