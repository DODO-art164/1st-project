name: 패션 셀러 수익성 진단 베타 신청
description: 민감한 판매 데이터 없이 서비스 범위와 연락 방법만 먼저 협의합니다.
title: "[베타 신청] 수익성 진단"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        신청 감사합니다. 이 게시판은 공개됩니다. 실제 매출, 원가표, 고객정보, 연락처 등 민감한 정보는 절대 작성하지 마세요.
  - type: dropdown
    id: plan
    attributes:
      label: 관심 서비스
      options:
        - 상품 10개 진단 (49,000원)
        - 브랜드 수익 진단 (99,000원)
        - 월간 운영 점검 대기 신청 (149,000원/월)
        - 아직 결정하지 못함
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: 현재 단계
      options:
        - 브랜드 출시 전
        - 출시 후 6개월 미만
        - 운영 6개월 이상
        - 여러 판매 채널 운영 중
    validations:
      required: true
  - type: input
    id: products
    attributes:
      label: 분석이 필요한 상품 수
      placeholder: 예: 8개
    validations:
      required: true
  - type: input
    id: channels
    attributes:
      label: 주요 판매 채널
      placeholder: 예: 자사몰, 스마트스토어, 패션 플랫폼
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 가장 해결하고 싶은 문제
      description: 구체적인 금액이나 민감한 정보는 제외해 주세요.
      placeholder: 예: 매출은 늘지만 광고비와 할인 후 실제 이익이 남는지 모르겠습니다.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 공개 게시판 확인
      options:
        - label: 고객정보, 실제 매출표, 원가표, 연락처 등 민감정보를 작성하지 않겠습니다.
          required: true
